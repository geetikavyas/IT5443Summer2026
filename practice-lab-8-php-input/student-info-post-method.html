<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Form</title>
</head>
<body>

    <h1>Shore Innovation Center Student Information Form</h1>

    <form method="post" action="process-student-info.php">

        <label for="studentName">Student Name:</label>
        <input type="text" id="studentName" name="studentName">
        
        <br><br>

        <label for="studentEmail">Student Email:</label>
        <input type="email" id="studentEmail" name="studentEmail">

        <br><br>

        <label for="studentStatus">Student Status:</label>
        <select id="studentStatus" name="studentStatus">
            <option value="">-- Select Status --</option>
            <option value="Undergraduate">Undergraduate</option>
            <option value="Graduate">Graduate</option>
        </select>

        <br><br>

        <label for="comment">Why are you interested in the Shore Innovation Center?</label>
        <br>
        <textarea id="comment" name="comment" rows="5" cols="40"></textarea>

        <br><br>

        <input type="submit" value="Submit Information">

    </form>

</body>
</html>
