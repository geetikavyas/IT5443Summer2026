<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Interest Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 16px;
            margin: 30px;
            color: #222;
        }

        .calculator {
            width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <h1>Simple Interest Calculator</h1>

        <form method="post" action="simple-interest-calculator.php">

            <label for="principal">Principal Amount:</label>
            <input type="number" id="principal" name="principal" step="0.01" required>

            <label for="rate">Interest Rate (%):</label>
            <input type="number" id="rate" name="rate" step="0.01" required>

            <label for="time">Time in Years:</label>
            <input type="number" id="time" name="time" step="0.01" required>

            <button type="submit">Calculate Simple Interest</button>

        </form>
    </div>

</body>
</html>
