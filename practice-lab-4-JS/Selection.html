<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Selection</title>
</head>
<body>

<script>
    let number = prompt("Enter a number:");
    number = Number(number);

    document.write("<h2>Positive or Negative Check</h2>");

    if (number >= 0) {
        document.write("<p>The number is positive.</p>");
    } else {
        document.write("<p>The number is negative.</p>");
    }

    let word1 = prompt("Enter the first word:");
    let word2 = prompt("Enter the second word:");

    document.write("<h2>Text Comparison</h2>");

    if (word1 == word2) {
        document.write("<p>The two strings contain the same text.</p>");
    } else {
        document.write("<p>The two strings do not contain the same text.</p>");
    }
</script>

</body>
</html>
