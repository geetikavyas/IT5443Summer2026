<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Interest Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 16px;
            margin: 30px;
            color: #222;
        }

        .calculator {
            width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            padding: 12px;
            border: 1px solid #aaa;
            background-color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <h1>Simple Interest Calculator</h1>

        <label for="principal">Principal Amount:</label>
        <input type="number" id="principal">

        <label for="rate">Interest Rate (%):</label>
        <input type="number" id="rate">

        <label for="time">Time in Years:</label>
        <input type="number" id="time">

        <button type="button" onclick="calculateInterest()">Calculate Simple Interest</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateInterest() {
            // Get the values entered by the user
            let principal = document.getElementById("principal").value;
            let rate = document.getElementById("rate").value;
            let time = document.getElementById("time").value;

            // Convert input values from text to numbers
            principal = Number(principal);
            rate = Number(rate);
            time = Number(time);

            // Simple Interest formula: SI = (P × R × T) / 100
            let simpleInterest = (principal * rate * time) / 100;

            let totalAmount = principal + simpleInterest;

            document.getElementById("result").innerHTML =
                "Simple Interest: $" + simpleInterest.toFixed(2) +
                "<br>Total Amount: $" + totalAmount.toFixed(2);
        }
    </script>

</body>
</html>
